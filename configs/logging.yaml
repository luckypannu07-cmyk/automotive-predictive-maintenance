version: 1
disable_existing_loggers: False

formatters:
  standard:
    format: "[%(asctime)s] [%(levelname)s] [%(name)s] %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  
  detailed:
    format: "[%(asctime)s] [%(levelname)s] [%(pathname)s:%(lineno)d] %(funcName)s() - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: "logs/app.log"
    maxBytes: 10485760
    backupCount: 5

root:
  level: INFO
  handlers: [console, file]

loggers:
  main:
    level: INFO
    handlers: [console, file]
    propagate: False
  
  src.load_data:
    level: INFO
    handlers: [console, file]
    propagate: False
  
  src.train:
    level: INFO
    handlers: [console, file]
    propagate: False
